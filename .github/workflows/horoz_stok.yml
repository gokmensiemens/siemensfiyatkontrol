name: Horoz Stok Güncelle

on:
  schedule:
    - cron: '0,10,20,30,40,50 6-19 * * *'
  workflow_dispatch:
  push:
    paths:
      - '*.xlsx'

permissions:
  contents: write

jobs:
  stok-guncelle:
    runs-on: ubuntu-latest
    steps:
      - name: Repo'yu çek
        uses: actions/checkout@v5

      - name: Python kur
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Bağımlılıkları yükle
        run: |
          pip install playwright requests
          playwright install chromium

      - name: Stok çek
        env:
          HOROZ_KULLANICI: ${{ secrets.HOROZ_KULLANICI }}
          HOROZ_SIFRE: ${{ secrets.HOROZ_SIFRE }}
        run: python horoz_stok_actions.py

      - name: Log göster
        if: always()
        run: cat horoz_log.txt || echo "Log dosyası yok"

      - name: stok.json ve manifest.json'ı commit et
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stok.json manifest.json
          git diff --staged --quiet || git commit -m "stok/manifest güncellendi"
          git push
