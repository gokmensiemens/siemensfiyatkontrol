<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Siemens Fiyat Kontrol</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:   #007bff;
      --red:    #dc3545;
      --green:  #28a745;
      --dark:   #1a1a2e;
      --bg:     #f2f4f7;
      --white:  #ffffff;
      --border: #e0e4ea;
      --text:   #222;
      --muted:  #777;
      --r:      12px;
    }

    html, body {
      width: 100%;
      overflow-x: hidden;
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body { padding-bottom: 32px; }

    /* ── TOPBAR ── */
    .topbar {
      background: var(--blue);
      color: #fff;
      padding: 12px 16px 10px;
      position: sticky; top: 0; z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,.2);
    }
    .topbar-title { font-size: 1.1rem; font-weight: 800; }
    .topbar-sub   { font-size: .75rem; opacity: .8; margin-top: 1px; }

    /* ── STOK BUTONU ── */
    .stok-bar {
      padding: 10px 12px 6px;
    }
    #btnCanliStok {
      width: 100%;
      background: #9C1936;
      color: #fff;
      border: none;
      border-radius: var(--r);
      padding: 14px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: .3px;
    }
    #btnCanliStok:disabled { opacity: .55; }
    #stokGuncelMsg {
      text-align: center;
      font-size: .8rem;
      color: var(--muted);
      min-height: 20px;
      padding: 3px 0 0;
    }

    /* ── SEARCH ── */
    .search-bar {
      padding: 8px 12px 10px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    #barcodeInp {
      flex: 1;
      min-width: 0;
      padding: 14px 12px;
      border: 2.5px solid var(--blue);
      border-radius: var(--r);
      font-size: 1rem;
      font-weight: 600;
      background: #fffde7;
      color: var(--text);
      -webkit-appearance: none;
    }
    #barcodeInp:focus { outline: none; border-color: #0056b3; }

    .btn-ekle {
      flex-shrink: 0;
      background: var(--green);
      color: #fff;
      border: none;
      border-radius: var(--r);
      padding: 14px 16px;
      font-size: .95rem;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-temizle {
      flex-shrink: 0;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: var(--r);
      padding: 14px 12px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
    }

    /* ── AUTOCOMPLETE ── */
    #ac-list {
      position: fixed;
      z-index: 9999;
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 0 0 var(--r) var(--r);
      box-shadow: 0 8px 24px rgba(0,0,0,.15);
      max-height: 50vh;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .ac-item {
      padding: 13px 14px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      -webkit-tap-highlight-color: rgba(0,123,255,.08);
    }
    .ac-item:last-child { border-bottom: none; }
    .ac-item:active { background: #e8f0fe; }
    .ac-code { font-weight: 800; color: var(--blue); font-size: .95rem; }
    .ac-desc { font-size: .85rem; color: var(--muted); margin-top: 1px; }
    .ac-stok {
      display: inline-block;
      margin-top: 4px;
      font-size: .75rem;
      font-weight: 700;
      background: #e3f2fd;
      color: var(--blue);
      border: 1px solid #90caf9;
      border-radius: 5px;
      padding: 1px 7px;
    }

    /* ── BOŞ DURUM ── */
    #emptyState {
      text-align: center;
      padding: 60px 20px 40px;
      color: var(--muted);
    }
    #emptyState .ei { font-size: 3rem; margin-bottom: 10px; }
    #emptyState p { font-size: 1rem; }

    /* ── ÜRÜN KARTI ── */
    #cartList {
      padding: 0 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .prod-card {
      background: var(--white);
      border-radius: var(--r);
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      border-left: 4px solid var(--blue);
      overflow: hidden;
    }

    /* Kapalı satır */
    .pc-head {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 12px 12px 14px;
      cursor: pointer;
      -webkit-tap-highlight-color: rgba(0,0,0,.03);
      user-select: none;
    }
    .pc-head:active { background: #f5f8ff; }

    .pc-info { flex: 1; min-width: 0; }
    .pc-code { font-size: 1.1rem; font-weight: 800; color: var(--blue); }
    .pc-name {
      font-size: .95rem;
      color: var(--text);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .pc-notes {
      font-size: .82rem;
      color: #b05a00;
      font-style: italic;
      margin-top: 3px;
      line-height: 1.4;
      white-space: normal;
    }

    .pc-stok {
      flex-shrink: 0;
      font-size: .95rem;
      font-weight: 800;
      padding: 5px 12px;
      border-radius: 6px;
      white-space: nowrap;
    }
    .s-ok  { background: #d4edda; color: #155724; }
    .s-no  { background: #f8d7da; color: #721c24; }

    .pc-arrow {
      flex-shrink: 0;
      font-size: 1.1rem;
      color: var(--muted);
      transition: transform .2s;
      line-height: 1;
    }
    .prod-card.open .pc-arrow { transform: rotate(180deg); }

    .btn-sil {
      flex-shrink: 0;
      background: var(--red);
      color: #fff;
      border: none;
      border-radius: 7px;
      padding: 8px 12px;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
    }

    /* Açılan detay */
    .pc-body {
      display: none;
      border-top: 1px solid var(--border);
      background: #fafbff;
    }
    .prod-card.open .pc-body { display: block; }

    .price-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 11px 14px;
      border-bottom: 1px solid #f0f2f5;
    }
    .price-row:last-child { border-bottom: none; }
    .price-row.pr-footer { background: #edf4ff; }
    .pr-label { font-size: .9rem; color: var(--muted); font-weight: 600; }
    .pr-val   { font-size: 1.2rem; font-weight: 800; color: var(--text); }
    .price-row.pr-footer .pr-val { color: #0056b3; }

    /* ── TOPLAM ── */
    #totalsSection {
      margin: 10px 12px 0;
      display: none;
    }
    .totals-card {
      background: var(--white);
      border-radius: var(--r);
      box-shadow: 0 1px 4px rgba(0,0,0,.08);
      overflow: hidden;
    }
    .totals-head {
      background: var(--dark);
      color: #fff;
      padding: 14px 16px;
      font-size: 1.1rem;
      font-weight: 800;
    }

    /* dikey toplam satırları */
    .totals-section-label {
      padding: 10px 16px 4px;
      font-size: .8rem;
      font-weight: 700;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .4px;
      border-top: 1px solid var(--border);
    }
    .totals-section-label:first-of-type { border-top: none; }

    .totals-col-list { padding: 4px 0 8px; }
    .totals-col-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 16px;
    }
    .tc-label {
      font-size: .9rem;
      color: var(--muted);
      font-weight: 600;
    }
    .tc-val {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--text);
    }

    .totals-final-block {
      margin: 0;
      background: #d4edda;
      border-top: 2px solid #28a745;
    }
    .totals-final-block .totals-section-label {
      border-top: none;
      color: #2d6a4f;
      padding-top: 12px;
    }
    .totals-final-block .tc-label { color: #2d6a4f; }
    .totals-final-block .tc-val   { color: #155724; font-size: 1.35rem; }

    /* bundle */
    .bundle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px;
      border-top: 1px solid var(--border);
      gap: 10px;
    }
    .bundle-label { font-size: .85rem; font-weight: 700; color: #b03a00; flex-shrink: 0; }
    #manualBundInp {
      flex: 1;
      min-width: 0;
      padding: 10px;
      border: 2px solid var(--red);
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 700;
      color: var(--red);
      text-align: center;
      -webkit-appearance: none;
    }

    /* pulse dot */
    @keyframes pulse-dot {
      0%,100% { opacity:1; transform:scale(1); }
      50%      { opacity:.4; transform:scale(.7); }
    }
    .stok-wrap { display:inline-flex; align-items:center; gap:3px; }
    .pulse-dot {
      width:7px; height:7px; border-radius:50%;
      background: #28a745;
      animation: pulse-dot 1.2s ease-in-out infinite;
      flex-shrink:0;
    }
    .pulse-dot.red { background: var(--red); }

  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">⚡ Siemens Fiyat Kontrol</div>
  <div class="topbar-sub" id="statusMsg">Liste yükleniyor...</div>
</div>

<div class="stok-bar">
  <button id="btnCanliStok" onclick="canliStokGuncelle()">🔄 Horoz Lojistik'ten Güncel Stok Getir</button>
  <div id="stokGuncelMsg"></div>
</div>

<div class="search-bar">
  <input id="barcodeInp" type="text" placeholder="Ürün kodu veya adı yazın..."
    autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" inputmode="search">
  <button class="btn-ekle"    onclick="manuelEkle()">EKLE</button>
  <button class="btn-temizle" onclick="fullReset()">✕</button>
</div>

<div id="cartList">
  <div id="emptyState">
    <div class="ei">🔍</div>
    <p>Ürün aramaya başlayın</p>
  </div>
</div>

<div id="totalsSection">
  <div class="totals-card">
    <div class="totals-head">📊 Sepet Özeti</div>
    <div id="totalsBody"></div>
  </div>
</div>

<script>
/* ── STATE ── */
let db = [], cart = [], heads = [];
let priceStartIndex = 13;
let bipCol = "", phCol = "";
let linkMap = {};
let manualBundleVal = "";
let footerCols = []; // sadece HAVALE, TEK ÇEKİM, TAKSİT

/* ── UTILS ── */
const fixStr = s => !s ? "" : String(s)
  .replace(/İ/g,'i').replace(/I/g,'ı')
  .toLocaleLowerCase('tr-TR')
  .replace(/\s/g,'').trim();

const isFooterCol = hT =>
  !["HAKEDİŞ","ONLINE","PREMIUM","PHASE","BİP"].some(k => hT.includes(k)) &&
  ["HAVALE","ÇEKİM","TAKSİT"].some(k => hT.includes(k));

const isWrapCol = hT => ["NOTLAR","KOŞUL","AÇIĞA"].some(k => hT.includes(k));

const fmtPara = v => {
  let n = Math.ceil(parseFloat(v));
  return (!isNaN(n) && n > 0) ? n.toLocaleString('tr-TR') + ' ₺' : null;
};

/* ── LOAD ── */
window.onload = async function() {
  // stok.json arka planda yükle
  fetch('./stok.json?_=' + Date.now())
    .then(r => r.ok ? r.json() : {})
    .then(d => { window._stokJson = d; })
    .catch(() => { window._stokJson = {}; });

  try {
    const repoRes = await fetch('https://api.github.com/repos/gokmensiemens/siemensfiyatkontrol/contents/');
    if (!repoRes.ok) throw new Error("GitHub'a ulaşılamadı");
    const files = await repoRes.json();
    const excelFile = files.find(f => f.name.endsWith('.xlsx'));
    if (!excelFile) throw new Error("Excel bulunamadı");

    const dateStr = excelFile.name.replace('.xlsx','').replace(/_/g,' ');
    const buf = await (await fetch('./' + excelFile.name)).arrayBuffer();
    const wb  = XLSX.read(buf, { type:'array' });

    // Link map
    wb.SheetNames.forEach(sn => {
      const rows = XLSX.utils.sheet_to_json(wb.Sheets[sn], {defval:""});
      if (!rows.length) return;
      const keys = Object.keys(rows[0]);
      const lk = keys.find(k => /LİNK|URL|LINK/i.test(k));
      const ck = keys.find(k => /NO|KOD/i.test(k));
      if (lk && ck) rows.forEach(r => { let c=fixStr(r[ck]); if(c&&r[lk]) linkMap[c]=r[lk]; });
    });

    // Ana sheet
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], {defval:""});
    if (!rows.length) throw new Error("Veri yok");

    // Sütun filtrele
    heads = Object.keys(rows[0]).filter(h => {
      const hU = h.toUpperCase();
      if (hU.includes("PRİM HARİÇ") || h.includes("__EMPTY")) return false;
      if (/^3\s*TAKSİT/i.test(hU) || /^9\s*TAKSİT/i.test(hU)) return false;
      return true;
    });

    // ONLINE → BİP'in önüne
    let oi = heads.findIndex(h => h.toUpperCase().includes("ONLINE"));
    if (oi>-1) {
      let ok = heads.splice(oi,1)[0];
      let bi = heads.findIndex(h => h.toUpperCase().includes("BİP"));
      bi>-1 ? heads.splice(bi,0,ok) : heads.push(ok);
    }
    // AÇIĞA → TOPTAN'ın önüne
    let ai = heads.findIndex(h => /AÇIĞA|ACIGA/i.test(h.toUpperCase()));
    if (ai>-1) {
      let ak = heads.splice(ai,1)[0];
      let ti = heads.findIndex(h => h.toUpperCase().includes("TOPTAN"));
      ti>-1 ? heads.splice(ti,0,ak) : heads.push(ak);
    }

    bipCol = heads.find(x => x.toUpperCase().includes("BİP")) || "";
    phCol  = heads.find(x => x.toUpperCase().includes("PHASE")) || "";

    let ti2 = heads.findIndex(h => h.toUpperCase().includes("TOPTAN"));
    priceStartIndex = ti2 > -1 ? ti2 : 13;

    // Footer kolonları — sadece HAVALE, TEK ÇEKİM, TAKSİT
    footerCols = heads
      .map((h,i) => ({h,i,hT:h.toUpperCase()}))
      .filter(({i,hT}) => i >= priceStartIndex && isFooterCol(hT));

    db = rows;

    const lc = db.filter(r => linkMap[fixStr(r[heads[0]])]).length;
    document.getElementById('statusMsg').textContent = `${dateStr} · ${lc} ürün web sayfası`;

    initSearch();

  } catch(e) {
    document.getElementById('statusMsg').textContent = '⚠️ ' + e.message;
  }
};

/* ── SEARCH / AUTOCOMPLETE ── */
function initSearch() {
  const inp = document.getElementById('barcodeInp');

  inp.addEventListener('input', function() {
    removeAcList();
    const val = this.value.trim();
    if (!val) return;

    const q = fixStr(val);
    const results = [];
    for (let i=0; i<db.length && results.length<60; i++) {
      const code = String(db[i][heads[0]]||"");
      const desc = String(db[i][heads[1]]||"");
      if (fixStr(code).includes(q) || fixStr(desc).includes(q))
        results.push({ code, desc, row: db[i] });
    }
    if (!results.length) return;

    const rect = inp.getBoundingClientRect();
    const list = document.createElement('div');
    list.id = 'ac-list';
    list.style.top   = rect.bottom + 'px';
    list.style.left  = rect.left + 'px';
    list.style.width = rect.width + 'px';
    document.body.appendChild(list);

    results.forEach(({code, desc, row}) => {
      const isStudio = desc.toLowerCase().includes("studioline");
      const stokKey  = isStudio ? heads[3] : heads[2];
      const stok = (stokKey && row[stokKey]!==undefined && row[stokKey]!=="") ? row[stokKey] : "0";

      const el = document.createElement('div');
      el.className = 'ac-item';
      el.innerHTML =
        `<div class="ac-code">${code}</div>` +
        `<div class="ac-desc">${desc}</div>` +
        `<span class="ac-stok">Stok: ${stok}</span>`;

      const doAdd = () => {
        cart.push({...row});
        refreshCart();
        inp.value = "";
        removeAcList();
        setTimeout(()=>inp.focus(), 50);
      };
      el.addEventListener('mousedown', e => { e.preventDefault(); doAdd(); });

      // Mobil: touchstart/touchend ile scroll ile seçimi ayırt et
      let touchStartY = 0;
      el.addEventListener('touchstart', e => {
        touchStartY = e.touches[0].clientY;
      }, { passive: true });
      el.addEventListener('touchend', e => {
        const moved = Math.abs(e.changedTouches[0].clientY - touchStartY);
        if (moved < 10) { e.preventDefault(); doAdd(); }
      }, { passive: false });
      list.appendChild(el);
    });
  });

  inp.addEventListener('keyup', e => {
    if (e.key==='Enter'||e.key==='Go'||e.key==='Search'||e.keyCode===13) {
      e.preventDefault();
      const list = document.getElementById('ac-list');
      const first = list ? list.querySelector('.ac-item') : null;
      if (first) first.dispatchEvent(new MouseEvent('mousedown'));
      else manuelEkle();
    }
  });

  document.addEventListener('click', e => {
    if (e.target !== inp && !e.target.closest('#ac-list')) removeAcList();
  });
}

function removeAcList() {
  const el = document.getElementById('ac-list');
  if (el) el.remove();
}

function manuelEkle() {
  const inp = document.getElementById('barcodeInp');
  const val = (inp?.value||"").trim();
  if (!val) return;
  const q = fixStr(val);
  // Tam eşleşme
  let row = db.find(p => fixStr(String(p[heads[0]]||"")) === q);
  // Tek sonuç
  if (!row) {
    const m = db.filter(p =>
      fixStr(String(p[heads[0]]||"")).includes(q) ||
      fixStr(String(p[heads[1]]||"")).includes(q)
    );
    if (m.length === 1) row = m[0];
  }
  if (row) {
    cart.push({...row});
    refreshCart();
    inp.value = "";
    removeAcList();
  } else {
    inp.style.borderColor = '#dc3545';
    inp.style.background  = '#fff0f0';
    setTimeout(()=>{ inp.style.borderColor=''; inp.style.background='#fffde7'; }, 1200);
  }
}

function fullReset() {
  cart = []; manualBundleVal = "";
  const inp = document.getElementById('barcodeInp');
  if (inp) { inp.value=""; inp.focus(); }
  removeAcList();
  refreshCart();
}

/* ── CART RENDER ── */
function refreshCart() {
  const list = document.getElementById('cartList');
  const totSec = document.getElementById('totalsSection');

  if (!cart.length) {
    list.innerHTML = `<div id="emptyState"><div class="ei">🔍</div><p>Ürün aramaya başlayın</p></div>`;
    totSec.style.display = 'none';
    return;
  }

  list.innerHTML = '';

  cart.forEach((item, i) => {
    const code     = String(item[heads[0]]||'');
    const codeF    = fixStr(code);
    const desc     = String(item[heads[1]]||'');
    const descHTML = linkMap[codeF]
      ? `<a href="${linkMap[codeF]}" target="_blank" style="color:var(--blue);text-decoration:underline;">${desc}</a>`
      : desc;

    // Stok
    const isStudio = desc.toLowerCase().includes("studioline");
    const stokCol  = isStudio ? heads[3] : heads[2];
    const excelStok = (stokCol && item[stokCol]!==undefined && item[stokCol]!=="") ? item[stokCol] : '0';
    const stokCls  = (parseInt(excelStok)||0) > 0 ? 's-ok' : 's-no';

    // Notlar (BİP koşulu, ürün notu, AÇIĞA satış notu)
    let notParts = [];
    heads.forEach(h => {
      const hT = h.toUpperCase();
      if (!isWrapCol(hT)) return;
      const v = String(item[h]||'').trim();
      if (v && v !== '-') notParts.push(v);
    });
    const notHTML = notParts.length
      ? `<div class="pc-notes">${notParts.join(' · ')}</div>`
      : '';

    // Fiyat satırları (accordion içi)
    let priceHTML = '';
    heads.forEach((h,idx) => {
      if (idx < priceStartIndex) return;
      const hT = h.toUpperCase();
      if (isWrapCol(hT)) return; // notlar yukarıda gösterildi
      const v   = item[h];
      const val = fmtPara(v);
      if (!val) return;
      const cls = isFooterCol(hT) ? 'price-row pr-footer' : 'price-row';
      priceHTML += `<div class="${cls}">
        <span class="pr-label">${h}</span>
        <span class="pr-val">${val}</span>
      </div>`;
    });

    const card = document.createElement('div');
    card.className = 'prod-card';
    card.innerHTML = `
      <div class="pc-head" onclick="toggleCard(this)">
        <div class="pc-info">
          <div class="pc-code">${code}</div>
          <div class="pc-name">${descHTML}</div>
          ${notHTML}
        </div>
        <span id="stok-val-${code}" class="pc-stok ${stokCls}">${excelStok}</span>
        <span class="pc-arrow">▾</span>
        <button class="btn-sil" onclick="event.stopPropagation();removeItem(${i})">SİL</button>
      </div>
      <div class="pc-body">${priceHTML}</div>
    `;
    list.appendChild(card);
  });

  calcTotals();
}

function toggleCard(head) {
  head.closest('.prod-card').classList.toggle('open');
}

function removeItem(i) {
  cart.splice(i,1);
  if (!cart.length) manualBundleVal = "";
  refreshCart();
}

/* ── TOTALS ── */
function calcTotals() {
  const sec  = document.getElementById('totalsSection');
  const body = document.getElementById('totalsBody');
  if (!cart.length) { sec.style.display='none'; return; }
  sec.style.display = 'block';

  let base = {}, disc = 0, bVal = parseFloat(manualBundleVal)||0;
  cart.forEach(p => {
    disc += (Math.ceil(parseFloat(p[bipCol]))||0) + (Math.ceil(parseFloat(p[phCol]))||0);
    footerCols.forEach(({h,i}) => {
      base[i] = (base[i]||0) + (Math.ceil(parseFloat(p[h]))||0);
    });
  });

  const colRows = (valFn) => footerCols.map(({h,i}) => {
    const v = valFn(i);
    return `<div class="totals-col-row">
      <span class="tc-label">${h}</span>
      <span class="tc-val">${v > 0 ? v.toLocaleString('tr-TR') + ' ₺' : '-'}</span>
    </div>`;
  }).join('');

  body.innerHTML = `
    <div class="totals-section-label">Liste Toplamı</div>
    <div class="totals-col-list">${colRows(i => base[i]||0)}</div>

    <div class="totals-section-label">BİP / Phase Out İndirimi</div>
    <div class="totals-col-list">
      <div class="totals-col-row">
        <span class="tc-label">Toplam BİP/PHASEOUT İndirimi</span>
        <span class="tc-val">${disc > 0 ? disc.toLocaleString('tr-TR') + ' ₺' : '-'}</span>
      </div>
    </div>

    <div class="bundle-row">
      <span class="bundle-label">Bundle Hak Edişi</span>
      <input type="number" id="manualBundInp" placeholder="Yazınız..."
        value="${manualBundleVal}"
        onkeydown="if(event.key==='Enter'){manualBundleVal=this.value;calcTotals();}"
        onblur="manualBundleVal=this.value;calcTotals();">
    </div>

    <div class="totals-final-block">
      <div class="totals-section-label">✅ Satılabilir Minimum Tutarlar</div>
      <div class="totals-col-list">${colRows(i => (base[i]||0) - disc - bVal)}</div>
    </div>
  `;
}

/* ── CANLI STOK ── */
function _pulseDot(span, isRed) {
  let wrap = span.closest('.stok-wrap');
  if (wrap) {
    const dot = wrap.querySelector('.pulse-dot');
    if (dot) dot.className = 'pulse-dot' + (isRed?' red':'');
    return;
  }
  const parent = span.parentElement;
  wrap = document.createElement('span');
  wrap.className = 'stok-wrap';
  parent.insertBefore(wrap, span);
  wrap.appendChild(span);
  const dot = document.createElement('span');
  dot.className = 'pulse-dot' + (isRed?' red':'');
  wrap.insertBefore(dot, span);
}

async function canliStokGuncelle() {
  const btn = document.getElementById('btnCanliStok');
  const msg = document.getElementById('stokGuncelMsg');
  btn.disabled = true;
  msg.textContent = '⏳ Yükleniyor...';
  try {
    const res = await fetch('./stok.json?_=' + Date.now());
    if (!res.ok) throw new Error();
    window._stokJson = await res.json();
  } catch {
    msg.textContent = '❌ Stok verisi alınamadı';
    btn.disabled = false;
    return;
  }
  let n = 0;
  cart.forEach(item => {
    const code = String(item[heads[0]]||'');
    const span = document.getElementById('stok-val-' + code);
    if (!span) return;
    const wrap = span.closest('.stok-wrap');
    if (wrap) { wrap.parentElement.insertBefore(span, wrap); wrap.remove(); }
    const canli = window._stokJson[code];
    const v = (canli===undefined||canli===null) ? 0 : canli;
    span.textContent = v;
    span.className = 'pc-stok ' + (v>0 ? 's-ok' : 's-no');
    _pulseDot(span, v===0);
    n++;
  });
  msg.textContent = `✅ ${n} ürün güncellendi (${new Date().toLocaleTimeString('tr-TR')})`;
  btn.disabled = false;
}
</script>
